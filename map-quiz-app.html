// ─── HELPERS ─────────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function normalizeStr(s) {
  return s.trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[-–]/g, '-');
}

// ─── MAP IMAGE (embedded from uploads) ────────────────────────────────────────
// We'll use a reference to the file path directly. The image must be served
// alongside the HTML. Users should place europe.png in same directory.
const MAP_SRC = 'europe.png';

// ─── POINT COMPONENT ─────────────────────────────────────────────────────────
function Point({ point, state, onClick, label, showLabel }) {
  const stateClass = `point-${state}`;
  return (
    <div
      className={`map-point ${stateClass}`}
      style={{ left: `${point.x_pct}%`, top: `${point.y_pct}%` }}
      onClick={() => onClick && onClick(point)}
      title={showLabel ? point.name : undefined}
    >
      <div className="point-dot" />
      {showLabel && label && (
        <div className="name-tag">{label}</div>
      )}
    </div>
  );
}

// ─── MAP CANVAS ──────────────────────────────────────────────────────────────
function MapCanvas({ allPoints, quizPoints, pointStates, onPointClick, showAllLabels, popup }) {
  const wrapRef = useRef(null);

  return (
    <div className="map-wrapper" ref={wrapRef} style={{ width: '100%', paddingBottom: '73%', position: 'relative' }}>
      <img
        src={MAP_SRC}
        alt="Európa térkép"
        style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%' }}
        draggable={false}
      />

      {/* Render background points */}
      {allPoints.map(pt => {
        const state = pointStates[pt.id] || 'default';
        const isQuizPoint = quizPoints.some(q => q.id === pt.id);
        return (
          <Point
            key={pt.id}
            point={pt}
            state={state}
            onClick={isQuizPoint ? onPointClick : null}
            showLabel={showAllLabels && !isQuizPoint}
            label={pt.name}
          />
        );
      })}

      {/* Render quiz points on top */}
      {quizPoints.map(pt => {
        const state = pointStates[pt.id] || 'default';
        return (
          <Point
            key={`quiz-${pt.id}`}
            point={pt}
            state={state}
            onClick={onPointClick}
            showLabel={showAllLabels || state === 'correct'}
            label={pt.name}
          />
        );
      })}

      {/* Popup */}
      {popup && (
        <div
          className="popup-input"
          style={{ left: `${popup.x_pct}%`, top: `${popup.y_pct}%` }}
        >
          {popup.content}
        </div>
      )}
    </div>
  );
}

// ─── CATEGORY SELECTOR ───────────────────────────────────────────────────────
function CategorySelector({ mode, onStart, onBack }) {
  const [catMode, setCatMode] = useState('all'); // 'all' | 'select'
  const [selected, setSelected] = useState(new Set(ALL_CATEGORIES));
  const [count, setCount] = useState(15);

  const toggleCat = (cat) => {
    setSelected(prev => {
      const next = new Set(prev);
      if (next.has(cat)) { if (next.size > 1) next.delete(cat); }
      else next.add(cat);
      return next;
    });
  };

  const availablePoints = RAW_DATA.points.filter(p =>
    catMode === 'all' ? true : selected.has(p.category)
  );
  const maxCount = Math.min(availablePoints.length, 40);
  const actualCount = Math.min(count, maxCount);

  return (
    <div style={{
      minHeight: '100vh',
      display: 'flex',
      alignItems: 'center',
      justifyContent: 'center',
      padding: '2rem',
      background: 'linear-gradient(160deg, #1a1208 0%, #0d1a24 100%)'
    }}>
      <div className="parchment" style={{ maxWidth: 560, width: '100%', padding: '2.5rem 2rem' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: '1rem', marginBottom: '1.5rem' }}>
          <button className="btn-secondary" onClick={onBack}>← Vissza</button>
          <h2 className="font-display" style={{ fontSize: '1.1rem', letterSpacing: '0.1em', color: 'var(--ink)' }}>
            {mode === 'name-to-loc' ? '📍 Név → Helyszín' : '🏷️ Helyszín → Név'}
          </h2>
        </div>

        <div className="ornament" style={{ marginBottom: '1.2rem' }}>
          <div className="ornament-line" />
          <span style={{ fontSize: '0.72rem', fontFamily: 'Cinzel,serif', letterSpacing: '0.15em', color: 'var(--gold)' }}>KATEGÓRIÁK</span>
          <div className="ornament-line" />
        </div>

        <div style={{ display: 'flex', gap: '0.7rem', marginBottom: '1rem' }}>
          <span
            className={`chip ${catMode === 'all' ? 'chip-on' : 'chip-off'}`}
            onClick={() => setCatMode('all')}
          >Összes kategória</span>
          <span
            className={`chip ${catMode === 'select' ? 'chip-on' : 'chip-off'}`}
            onClick={() => setCatMode('select')}
          >Válassz kategóriát</span>
        </div>

        {catMode === 'select' && (
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.5rem', marginBottom: '1.2rem' }}>
            {ALL_CATEGORIES.map(cat => (
              <span
                key={cat}
                className={`chip ${selected.has(cat) ? 'chip-on' : 'chip-off'}`}
                onClick={() => toggleCat(cat)}
              >
                {CATEGORY_LABELS[cat] || cat}
                <span style={{ marginLeft: '0.3rem', fontSize: '0.65rem', opacity: 0.7 }}>
                  ({RAW_DATA.points.filter(p => p.category === cat).length})
                </span>
              </span>
            ))}
          </div>
        )}

        <div className="ornament" style={{ margin: '1.2rem 0' }}>
          <div className="ornament-line" />
          <span style={{ fontSize: '0.72rem', fontFamily: 'Cinzel,serif', letterSpacing: '0.15em', color: 'var(--gold)' }}>KÉRDÉSEK SZÁMA</span>
          <div className="ornament-line" />
        </div>

        <div style={{ display: 'flex', alignItems: 'center', gap: '1rem', marginBottom: '2rem' }}>
          <input
            type="range"
            min={5}
            max={maxCount}
            value={actualCount}
            onChange={e => setCount(Number(e.target.value))}
            style={{ flex: 1, accentColor: 'var(--gold)' }}
          />
          <span className="font-display" style={{ fontSize: '1.4rem', color: 'var(--ink)', minWidth: '3rem', textAlign: 'center' }}>
            {actualCount}
          </span>
          <span className="font-body" style={{ fontSize: '0.85rem', color: '#6b5030' }}>
            / {maxCount} pont
          </span>
        </div>

        <button
          className="btn-primary"
          style={{ width: '100%', fontSize: '1rem', padding: '0.9rem' }}
          onClick={() => onStart({
            categories: catMode === 'all' ? ALL_CATEGORIES : [...selected],
            count: actualCount
          })}
        >
          Kvíz indítása ⟶
        </button>
      </div>
    </div>
  );
}

// ─── MODE 1: NAME → LOCATION ──────────────────────────────────────────────────
function QuizNameToLocation({ config, onBack }) {
  const allPoints = RAW_DATA.points;

  const quizPoints = useMemo(() => {
    const filtered = allPoints.filter(p => config.categories.includes(p.category));
    return shuffle(filtered).slice(0, config.count);
  }, []);

  const [pointStates, setPointStates] = useState({});
  const [remaining, setRemaining] = useState(() => new Set(quizPoints.map(p => p.id)));
  const [incorrectCount, setIncorrectCount] = useState(0);
  const [flashId, setFlashId] = useState(null);
  const [done, setDone] = useState(false);

  const correctCount = quizPoints.length - remaining.size;
  const progress = correctCount / quizPoints.length;

  const handlePointClick = useCallback((point) => {
    if (!remaining.has(point.id)) return;

    // Correct
    setPointStates(prev => ({ ...prev, [point.id]: 'correct' }));
    setRemaining(prev => {
      const next = new Set(prev);
      next.delete(point.id);
      if (next.size === 0) setTimeout(() => setDone(true), 600);
      return next;
    });
  }, [remaining]);

  const handleWrongClick = useCallback((point) => {
    if (remaining.has(point.id)) return; // it's a quiz point but not matched by name
    // This won't fire - wrong clicks are handled differently
  }, [remaining]);

  // In mode 1, clicking any point checks if it matches a remaining name
  // We highlight the clicked point briefly if wrong
  const handleAnyClick = useCallback((point) => {
    if (!remaining.has(point.id)) {
      // flash red for wrong click
      setFlashId(point.id);
      setIncorrectCount(c => c + 1);
      setTimeout(() => setFlashId(null), 500);
      return;
    }
    handlePointClick(point);
  }, [remaining, handlePointClick]);

  const allPointsWithState = useMemo(() => {
    const states = { ...pointStates };
    if (flashId) states[flashId] = 'incorrect';
    return states;
  }, [pointStates, flashId]);

  const nameList = useMemo(() => shuffle(quizPoints), [quizPoints]);

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', background: 'linear-gradient(160deg, #1a1208 0%, #0d1a24 100%)' }}>
      {/* Top bar */}
      <div style={{ padding: '0.7rem 1rem', background: 'rgba(26,18,8,0.8)', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: '1rem', flexWrap: 'wrap' }}>
        <button className="btn-secondary" onClick={onBack}>← Menü</button>
        <span className="font-display" style={{ color: 'var(--gold)', fontSize: '0.85rem', letterSpacing: '0.1em' }}>
          📍 NÉV → HELYSZÍN
        </span>
        <div style={{ flex: 1, minWidth: 120 }}>
          <div className="progress-bar-bg">
            <div className="progress-bar-fill" style={{ width: `${progress * 100}%` }} />
          </div>
        </div>
        <span className="font-display" style={{ color: 'var(--parchment)', fontSize: '0.9rem' }}>
          {correctCount}/{quizPoints.length}
        </span>
        <span style={{ color: '#8b5050', fontSize: '0.8rem', fontFamily: 'Crimson Pro,serif' }}>
          {incorrectCount > 0 && `${incorrectCount} hiba`}
        </span>
      </div>

      {done && (
        <div style={{ padding: '1rem', zIndex: 100 }}>
          <div className="completion-banner">
            <div style={{ fontSize: '2rem', marginBottom: '0.5rem' }}>🎉</div>
            <h2 className="font-display" style={{ color: 'var(--gold)', fontSize: '1.4rem', letterSpacing: '0.1em', marginBottom: '0.3rem' }}>
              Kész!
            </h2>
            <p className="font-body" style={{ color: 'var(--parchment)', marginBottom: '1rem', fontSize: '1rem' }}>
              Minden pontot megtaláltál! Hibák: {incorrectCount}
            </p>
            <button className="btn-primary" onClick={onBack}>← Vissza a menübe</button>
          </div>
        </div>
      )}

      <div className="quiz-layout" style={{ display: 'flex', flex: 1, gap: 0, overflow: 'hidden' }}>
        {/* Sidebar: name list */}
        <div className="sidebar parchment" style={{ width: 230, minWidth: 180, padding: '1rem 0.7rem', overflowY: 'auto', borderRight: '2px solid var(--border)', flexShrink: 0 }}>
          <div className="font-display" style={{ fontSize: '0.7rem', letterSpacing: '0.12em', color: 'var(--gold)', marginBottom: '0.7rem', textAlign: 'center' }}>
            MEGTALÁLANDÓ NEVEK
          </div>
          {nameList.map(pt => {
            const isCorrect = !remaining.has(pt.id);
            return (
              <div key={pt.id} className={`name-item ${isCorrect ? 'name-item-correct' : 'name-item-pending'}`}>
                {isCorrect ? '✓ ' : '○ '}{pt.name}
              </div>
            );
          })}
        </div>

        {/* Map */}
        <div style={{ flex: 1, padding: '0.5rem', overflow: 'hidden' }}>
          <MapCanvas
            allPoints={allPoints}
            quizPoints={quizPoints}
            pointStates={allPointsWithState}
            onPointClick={handleAnyClick}
            showAllLabels={false}
          />
          <p className="font-body" style={{ color: 'var(--parchment-deep)', fontSize: '0.82rem', textAlign: 'center', marginTop: '0.4rem', opacity: 0.7 }}>
            Kattints a megfelelő pontra a bal oldali nevek alapján
          </p>
        </div>
      </div>
    </div>
  );
}

// ─── MODE 2: LOCATION → NAME ──────────────────────────────────────────────────
function QuizLocationToName({ config, onBack }) {
  const quizPoints = useMemo(() => {
    const filtered = RAW_DATA.points.filter(p => config.categories.includes(p.category));
    return shuffle(filtered).slice(0, config.count);
  }, []);

  const [pointStates, setPointStates] = useState({});
  const [activePopup, setActivePopup] = useState(null); // { id, inputVal, error }
  const [incorrectCount, setIncorrectCount] = useState(0);
  const [done, setDone] = useState(false);

  const correctIds = useMemo(() => new Set(
    Object.entries(pointStates).filter(([,v]) => v === 'correct').map(([k]) => Number(k))
  ), [pointStates]);

  const correctCount = correctIds.size;
  const progress = correctCount / quizPoints.length;

  const inputRef = useRef(null);

  useEffect(() => {
    if (activePopup && inputRef.current) {
      setTimeout(() => inputRef.current && inputRef.current.focus(), 80);
    }
  }, [activePopup?.id]);

  const handlePointClick = useCallback((point) => {
    if (correctIds.has(point.id)) return;
    if (activePopup?.id === point.id) {
      setActivePopup(null);
      return;
    }
    setActivePopup({ id: point.id, inputVal: '', error: false });
  }, [correctIds, activePopup]);

  const handleSubmit = useCallback(() => {
    if (!activePopup) return;
    const point = quizPoints.find(p => p.id === activePopup.id);
    if (!point) return;

    const accepted = [normalizeStr(point.name)];
    // Also accept without category suffixes like -tenger, -sziget etc.
    const typed = normalizeStr(activePopup.inputVal);

    if (accepted.includes(typed)) {
      setPointStates(prev => {
        const next = { ...prev, [point.id]: 'correct' };
        const newCorrect = Object.values(next).filter(v => v === 'correct').length;
        if (newCorrect === quizPoints.length) setTimeout(() => setDone(true), 600);
        return next;
      });
      setActivePopup(null);
    } else {
      setIncorrectCount(c => c + 1);
      setPointStates(prev => ({ ...prev, [point.id]: 'incorrect' }));
      setActivePopup(prev => ({ ...prev, error: true }));
      setTimeout(() => {
        setPointStates(prev => {
          if (prev[point.id] === 'incorrect') {
            const next = { ...prev };
            delete next[point.id];
            return next;
          }
          return prev;
        });
        setActivePopup(prev => prev ? { ...prev, error: false } : null);
      }, 700);
    }
  }, [activePopup, quizPoints]);

  const handleKeyDown = useCallback((e) => {
    if (e.key === 'Enter') handleSubmit();
    if (e.key === 'Escape') setActivePopup(null);
  }, [handleSubmit]);

  const getPointState = useCallback((id) => {
    if (correctIds.has(id)) return 'correct';
    if (activePopup?.id === id) return 'selected';
    return pointStates[id] || 'default';
  }, [correctIds, activePopup, pointStates]);

  const allPointStates = useMemo(() => {
    const states = {};
    quizPoints.forEach(p => { states[p.id] = getPointState(p.id); });
    return states;
  }, [quizPoints, getPointState]);

  const popupPoint = activePopup ? quizPoints.find(p => p.id === activePopup.id) : null;

  const popup = popupPoint ? {
    x_pct: popupPoint.x_pct,
    y_pct: popupPoint.y_pct,
    content: (
      <div>
        <div className="font-display" style={{ fontSize: '0.65rem', letterSpacing: '0.1em', color: 'var(--gold)', marginBottom: '0.4rem' }}>
          MI EZ A PONT?
        </div>
        <div style={{ display: 'flex', gap: '0.4rem' }}>
          <input
            ref={inputRef}
            className={activePopup.error ? 'input-error' : ''}
            value={activePopup.inputVal}
            onChange={e => setActivePopup(prev => ({ ...prev, inputVal: e.target.value, error: false }))}
            onKeyDown={handleKeyDown}
            placeholder="Írd be a nevet…"
            autoComplete="off"
          />
          <button className="btn-primary" style={{ padding: '0.3rem 0.7rem', fontSize: '0.8rem' }} onClick={handleSubmit}>→</button>
        </div>
        {activePopup.error && (
          <div style={{ color: 'var(--crimson)', fontSize: '0.78rem', marginTop: '0.3rem', fontFamily: 'Crimson Pro,serif' }}>
            Nem helyes. Próbáld újra!
          </div>
        )}
        <div style={{ fontSize: '0.68rem', color: '#8b7048', marginTop: '0.3rem', fontFamily: 'Crimson Pro,serif' }}>
          Kategória: {CATEGORY_LABELS[popupPoint.category] || popupPoint.category}
        </div>
      </div>
    )
  } : null;

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', background: 'linear-gradient(160deg, #1a1208 0%, #0d1a24 100%)' }}>
      {/* Top bar */}
      <div style={{ padding: '0.7rem 1rem', background: 'rgba(26,18,8,0.8)', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: '1rem', flexWrap: 'wrap' }}>
        <button className="btn-secondary" onClick={onBack}>← Menü</button>
        <span className="font-display" style={{ color: 'var(--gold)', fontSize: '0.85rem', letterSpacing: '0.1em' }}>
          🏷️ HELYSZÍN → NÉV
        </span>
        <div style={{ flex: 1, minWidth: 120 }}>
          <div className="progress-bar-bg">
            <div className="progress-bar-fill" style={{ width: `${progress * 100}%` }} />
          </div>
        </div>
        <span className="font-display" style={{ color: 'var(--parchment)', fontSize: '0.9rem' }}>
          {correctCount}/{quizPoints.length}
        </span>
        {incorrectCount > 0 && (
          <span style={{ color: '#8b5050', fontSize: '0.8rem', fontFamily: 'Crimson Pro,serif' }}>
            {incorrectCount} hiba
          </span>
        )}
      </div>

      {done && (
        <div style={{ padding: '1rem' }}>
          <div className="completion-banner">
            <div style={{ fontSize: '2rem', marginBottom: '0.5rem' }}>🎉</div>
            <h2 className="font-display" style={{ color: 'var(--gold)', fontSize: '1.4rem', letterSpacing: '0.1em', marginBottom: '0.3rem' }}>
              Kész!
            </h2>
            <p className="font-body" style={{ color: 'var(--parchment)', marginBottom: '1rem', fontSize: '1rem' }}>
              Minden pontot megneveztél! Hibák: {incorrectCount}
            </p>
            <button className="btn-primary" onClick={onBack}>← Vissza a menübe</button>
          </div>
        </div>
      )}

      <div style={{ flex: 1, padding: '0.5rem' }}>
        <MapCanvas
          allPoints={[]}
          quizPoints={quizPoints}
          pointStates={allPointStates}
          onPointClick={handlePointClick}
          showAllLabels={false}
          popup={popup}
        />
        <p className="font-body" style={{ color: 'var(--parchment-deep)', fontSize: '0.82rem', textAlign: 'center', marginTop: '0.4rem', opacity: 0.7 }}>
          Kattints egy pontra és írd be a nevét!
        </p>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState('menu');   // menu | category | quiz
  const [mode, setMode] = useState(null);
  const [quizConfig, setQuizConfig] = useState(null);

  const handleSelectMode = (m) => {
    setMode(m);
    setScreen('category');
  };

  const handleStart = (cfg) => {
    setQuizConfig(cfg);
    setScreen('quiz');
  };

  const handleBack = () => {
    setScreen('menu');
    setMode(null);
    setQuizConfig(null);
  };

  if (screen === 'menu') return <MainMenu onSelectMode={handleSelectMode} />;
  if (screen === 'category') return <CategorySelector mode={mode} onStart={handleStart} onBack={handleBack} />;
  if (screen === 'quiz') {
    if (mode === 'name-to-loc') return <QuizNameToLocation config={quizConfig} onBack={handleBack} />;
    if (mode === 'loc-to-name') return <QuizLocationToName config={quizConfig} onBack={handleBack} />;
  }
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
